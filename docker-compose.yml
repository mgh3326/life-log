services:
  api:
    image: ghcr.io/mgh3326/life-log:${TAG:-latest}
    network_mode: host
    env_file: .env.prod
    command: uvicorn app.main:app --host 0.0.0.0 --port ${API_PORT:-8100}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT:-8100}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always

  mcp:
    image: ghcr.io/mgh3326/life-log:${TAG:-latest}
    network_mode: host
    env_file: .env.prod
    command: python -m app.mcp_server.main
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/${MCP_PORT:-8101}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always

  migration:
    image: ghcr.io/mgh3326/life-log:${TAG:-latest}
    network_mode: host
    env_file: .env.prod
    command: alembic upgrade head
    profiles: ["migrate"]
